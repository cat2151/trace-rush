<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trace Rush</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0f0f11;color:#e8e8ec;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;}
#app{max-width:640px;margin:0 auto;padding:1rem;}
h1{font-size:22px;font-weight:600;letter-spacing:0.04em;text-align:center;margin-bottom:1rem;color:#e8e8ec;}
h1 span{color:#378ADD;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:0.75rem;}
.stat{background:#1c1c20;border-radius:10px;padding:0.75rem 1rem;text-align:center;border:0.5px solid #2a2a30;}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:500;color:#e8e8ec;}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
#live-score{font-size:26px;font-weight:500;color:#e8e8ec;min-width:72px;text-align:right;line-height:1.1;}
#live-label{font-size:11px;color:#888;text-align:right;}
.score-wrap{flex:1;}
#score-bar-wrap{height:8px;background:#2a2a30;border-radius:4px;overflow:hidden;margin:0.4rem 0;}
#score-bar{height:100%;width:0%;border-radius:4px;transition:width 0.06s,background 0.15s;}
#status-msg{font-size:13px;color:#888;}
.btn-row{display:flex;gap:6px;flex-shrink:0;}
button{background:transparent;border:0.5px solid #3a3a42;border-radius:8px;padding:6px 14px;font-size:13px;color:#aaa;cursor:pointer;transition:background 0.15s;}
button:hover{background:#2a2a30;}
.canvas-wrap{position:relative;}
canvas{display:block;width:100%;border-radius:12px;border:0.5px solid #2a2a30;background:#16161a;touch-action:none;cursor:crosshair;}
#pass-flash,#fail-flash{display:none;position:absolute;inset:0;border-radius:12px;pointer-events:none;}
#pass-flash{border:3px solid #1D9E75;}
#fail-flash{border:3px solid #E24B4A;}
.legend{font-size:11px;color:#666;margin-top:8px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.legend span{display:flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<div id="app">
  <h1>Trace <span>Rush</span></h1>

  <div class="stat-row">
    <div class="stat"><div class="stat-label">クリア数</div><div class="stat-value" id="s-pass">0</div></div>
    <div class="stat"><div class="stat-label">挑戦数</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">最高スコア</div><div class="stat-value" id="s-best">—</div></div>
  </div>

  <div class="controls">
    <div>
      <div id="live-score">—</div>
      <div id="live-label">/ 100</div>
    </div>
    <div class="score-wrap">
      <div id="score-bar-wrap"><div id="score-bar"></div></div>
      <div id="status-msg">START からなぞってください</div>
    </div>
    <div class="btn-row">
      <button id="next-btn">新しい曲線</button>
      <button id="clear-btn">やり直し</button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" height="400"></canvas>
    <div id="pass-flash"></div>
    <div id="fail-flash"></div>
  </div>

  <div class="legend">
    <span>線の色:</span>
    <span style="color:#1D9E75">■ 満点（真上）</span>
    <span style="color:#EF9F27">■ 中程度</span>
    <span style="color:#E24B4A">■ ギリギリ</span>
  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const liveScore = document.getElementById("live-score");
const liveLabel = document.getElementById("live-label");
const scoreBar = document.getElementById("score-bar");
const statusMsg = document.getElementById("status-msg");
const sPass = document.getElementById("s-pass");
const sTotal = document.getElementById("s-total");
const sBest = document.getElementById("s-best");
const clearBtn = document.getElementById("clear-btn");
const nextBtn = document.getElementById("next-btn");
const passFlash = document.getElementById("pass-flash");
const failFlash = document.getElementById("fail-flash");

let W, H, pts=[], drawing=false;
let passCount=0, totalCount=0, bestScore=0;
let dirty=false;
let penX=null, penY=null, prevDist=Infinity;
let ptScores=[], headIdx=0;
let state="idle";
let endBestDist=Infinity;
let endTempScore=null;

const HIT_RADIUS  = 22;
const PT_SPACING  = 28;
const PT_DRAW_R   = 5;
const PT_MAX      = 10.0;
const PT_MIN      = 5.0;
const INTERP_STEP = 4;
const MARKER_R    = 10;

function resize(){
  W = canvas.parentElement.clientWidth || 600;
  H = 400;
  canvas.width = W;
  canvas.height = H;
}

function randomCurve(){
  const mg=W*0.12;
  const x0=mg,x1=W-mg,y0=mg,y1=H-mg,cx=W/2,cy=H/2;
  const pattern=Math.floor(Math.random()*7);
  let anchors=[];
  switch(pattern){
    case 0: anchors=[{x:x0,y:y0+Math.random()*(y1-y0)},{x:cx*0.7+Math.random()*W*0.1,y:y0+Math.random()*(cy-y0)*0.8},{x:cx+Math.random()*W*0.1,y:cy+Math.random()*(y1-cy)*0.8},{x:x1,y:y0+Math.random()*(y1-y0)}]; break;
    case 1: anchors=[{x:x0+Math.random()*W*0.1,y:cy+Math.random()*(y1-cy)*0.7},{x:cx*0.6,y:y0+Math.random()*(cy-y0)*0.6},{x:cx*1.4,y:cy+Math.random()*(y1-cy)*0.6},{x:x1-Math.random()*W*0.1,y:y0+Math.random()*(cy-y0)*0.7}]; break;
    case 2: anchors=[{x:x0,y:y0},{x:x0+W*0.3+Math.random()*W*0.15,y:y0+H*0.2+Math.random()*H*0.2},{x:x0+W*0.5+Math.random()*W*0.15,y:y0+H*0.5+Math.random()*H*0.15},{x:x1-Math.random()*W*0.1,y:y1-Math.random()*H*0.1}]; break;
    case 3: anchors=[{x:x0+Math.random()*W*0.1,y:y0+Math.random()*H*0.15},{x:x0+W*0.1+Math.random()*W*0.1,y:y1-Math.random()*H*0.1},{x:cx+Math.random()*W*0.15-W*0.075,y:y1-Math.random()*H*0.1},{x:x1-W*0.1-Math.random()*W*0.1,y:y1-Math.random()*H*0.1},{x:x1-Math.random()*W*0.1,y:y0+Math.random()*H*0.15}]; break;
    case 4: anchors=[{x:x0,y:y0+Math.random()*H*0.15},{x:x1-Math.random()*W*0.1,y:y0+H*0.1+Math.random()*H*0.1},{x:x0+Math.random()*W*0.1,y:y1-H*0.1-Math.random()*H*0.1},{x:x1,y:y1-Math.random()*H*0.15}]; break;
    case 5: {const n=5;for(let i=0;i<n;i++) anchors.push({x:x0+(x1-x0)*i/(n-1)+((Math.random()-0.5)*W*0.18),y:y0+Math.random()*(y1-y0)});anchors.forEach(a=>{a.x=Math.max(x0,Math.min(x1,a.x));a.y=Math.max(y0,Math.min(y1,a.y));});} break;
    case 6: anchors=[{x:x0+Math.random()*(x1-x0),y:y0},{x:x0+Math.random()*(cx-x0)*0.8,y:cy*0.6+Math.random()*H*0.1},{x:cx+Math.random()*(x1-cx)*0.8,y:cy+Math.random()*H*0.1},{x:x0+Math.random()*(x1-x0),y:y1}]; break;
  }
  const raw=[];const SUB=120;
  for(let s=0;s<anchors.length-1;s++){
    const p0=anchors[Math.max(0,s-1)],p1=anchors[s],p2=anchors[s+1],p3=anchors[Math.min(anchors.length-1,s+2)];
    for(let i=(s===0?0:1);i<=SUB;i++){
      const t=i/SUB,t2=t*t,t3=t2*t;
      raw.push({
        x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
      });
    }
  }
  const main=[raw[0]];let accum=0;
  for(let i=1;i<raw.length;i++){
    const dx=raw[i].x-raw[i-1].x,dy=raw[i].y-raw[i-1].y;
    accum+=Math.sqrt(dx*dx+dy*dy);
    if(accum>=PT_SPACING){main.push(raw[i]);accum=0;}
  }
  const last=raw[raw.length-1],prev=main[main.length-1];
  if(Math.sqrt((last.x-prev.x)**2+(last.y-prev.y)**2)>=PT_SPACING*0.5) main.push(last);
  const N=main.length;
  if(N>=2){
    const dx=main[N-1].x-main[N-2].x,dy=main[N-1].y-main[N-2].y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    main.push({x:main[N-1].x+(dx/len)*PT_SPACING,y:main[N-1].y+(dy/len)*PT_SPACING,isGuard:true});
  }
  return main;
}

function realPtCount(){return pts.filter(p=>!p.isGuard).length;}
function distF(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return Math.sqrt(dx*dx+dy*dy);}
function distToPointScore(d){return PT_MAX-(Math.min(d,HIT_RADIUS)/HIT_RADIUS)*(PT_MAX-PT_MIN);}
function scoreToColor(s){
  const r=(s-PT_MIN)/(PT_MAX-PT_MIN);
  if(r>=0.5){const t=(r-0.5)*2;return `rgb(${Math.round(239+(29-239)*t)},${Math.round(159+(158-159)*t)},${Math.round(39+(117-39)*t)})`;}
  else{const t=r*2;return `rgb(${Math.round(226+(239-226)*t)},${Math.round(75+(159-75)*t)},${Math.round(48+(39-48)*t)})`;}
}
function calcNormScore(extra){
  const raw=ptScores.reduce((a,p)=>a+p.score,0)+(extra||0);
  const max=realPtCount()*PT_MAX;
  return max>0?(raw/max)*100:0;
}

function processPenPoint(x,y){
  if(state==="failing"||state==="idle") return;
  if(state==="cleared"){
    const guardPt=pts[pts.length-1];
    if(guardPt&&guardPt.isGuard&&distF(x,y,guardPt.x,guardPt.y)<=HIT_RADIUS){
      onFail("描きすぎ — ENDで止めてください");return;
    }
    const endPt=pts[realPtCount()-1];
    const dEnd=distF(x,y,endPt.x,endPt.y);
    if(dEnd<endBestDist){
      endBestDist=dEnd;
      const ps=distToPointScore(endBestDist);
      endTempScore={score:ps,color:scoreToColor(ps)};
      dirty=true;
      updateScoreUI(calcNormScore(ps));
    }
    return;
  }
  if(headIdx>=pts.length) return;
  const hp=pts[headIdx];
  const curDist=distF(x,y,hp.x,hp.y);
  if(hp.isGuard){if(curDist<=HIT_RADIUS) onFail("描きすぎ");return;}
  const realN=realPtCount();
  const isEndPt=(headIdx===realN-1);
  if(isEndPt){
    if(curDist<=HIT_RADIUS){
      endBestDist=curDist;
      const ps=distToPointScore(curDist);
      endTempScore={score:ps,color:scoreToColor(ps)};
      state="cleared";
      statusMsg.style.color="#1D9E75";
      statusMsg.textContent="END到達！ ペンを離してクリア";
      dirty=true;
      updateScoreUI(calcNormScore(ps));
    }
    prevDist=curDist;
  } else {
    if(curDist<=HIT_RADIUS&&curDist>prevDist){
      const ps=distToPointScore(prevDist);
      ptScores.push({score:ps,color:scoreToColor(ps)});
      headIdx++;prevDist=Infinity;dirty=true;
      updateScoreUI(calcNormScore());
    } else {prevDist=curDist;}
  }
}

function handlePenMove(nx,ny){
  if(penX===null){penX=nx;penY=ny;processPenPoint(nx,ny);return;}
  const dx=nx-penX,dy=ny-penY,d=Math.sqrt(dx*dx+dy*dy);
  if(d<=INTERP_STEP){penX=nx;penY=ny;processPenPoint(nx,ny);}
  else{
    const steps=Math.ceil(d/INTERP_STEP);
    for(let i=1;i<=steps;i++){
      const t=i/steps;
      processPenPoint(penX+dx*t,penY+dy*t);
      if(state==="failing") break;
    }
    penX=nx;penY=ny;
  }
  dirty=true;
}

function onClear(){
  if(state!=="cleared") return;
  if(endTempScore) ptScores.push(endTempScore);
  const ns=calcNormScore();
  totalCount++;sTotal.textContent=totalCount;
  if(ns>bestScore){bestScore=ns;sBest.textContent=Math.round(ns);}
  passCount++;sPass.textContent=passCount;
  state="idle";
  statusMsg.style.color="#1D9E75";
  statusMsg.textContent="クリア！ "+Math.round(ns)+" / 100点";
  passFlash.style.display="block";
  dirty=true;
  setTimeout(()=>{passFlash.style.display="none";newCurve();},1800);
}

function onFail(msg){
  if(state==="failing") return;
  state="failing";endTempScore=null;
  totalCount++;sTotal.textContent=totalCount;
  statusMsg.style.color="#E24B4A";
  statusMsg.textContent=(msg||"失敗")+" — タッチで即リトライ";
  failFlash.style.display="block";
  dirty=true;
}

function resetAttempt(){
  headIdx=0;ptScores=[];prevDist=Infinity;penX=null;penY=null;drawing=false;
  endBestDist=Infinity;endTempScore=null;
  failFlash.style.display="none";
  liveScore.textContent="—";liveLabel.textContent="/ 100";
  scoreBar.style.width="0%";scoreBar.style.background="#E24B4A";
  statusMsg.textContent="START からなぞってください";
  statusMsg.style.color="#888";
  state="idle";dirty=true;
}

function updateScoreUI(ns){
  liveScore.textContent=Math.round(ns);
  const ratio=ns/100;
  scoreBar.style.width=(ratio*100)+"%";
  scoreBar.style.background=ratio>=0.8?"#1D9E75":ratio>=0.6?"#EF9F27":"#E24B4A";
  if(state==="playing"){
    statusMsg.style.color="#888";
    const rem=realPtCount()-ptScores.length;
    statusMsg.textContent="残り"+rem+"点 — 離さずに";
  }
}

function drawMarker(x,y,label,bgColor){
  const pad=4,fontSize=10;
  ctx.save();
  ctx.font=`bold ${fontSize}px -apple-system,sans-serif`;
  ctx.textAlign="center";ctx.textBaseline="middle";
  const tw=ctx.measureText(label).width;
  const bw=tw+pad*2,bh=fontSize+pad*2;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x-bw/2,y-bh/2,bw,bh,bh/2);
  else ctx.rect(x-bw/2,y-bh/2,bw,bh);
  ctx.fillStyle=bgColor;ctx.fill();
  ctx.fillStyle="#fff";ctx.fillText(label,x,y);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const realN=realPtCount();
  const drawScores=[...ptScores];
  if(state==="cleared"&&endTempScore) drawScores.push(endTempScore);
  const firstUnhit=drawScores.length;

  // 未合格ライン
  if(firstUnhit<realN){
    ctx.save();
    ctx.strokeStyle="rgba(55,138,221,0.22)";ctx.lineWidth=2;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.beginPath();
    ctx.moveTo(pts[Math.max(0,firstUnhit-1)].x,pts[Math.max(0,firstUnhit-1)].y);
    for(let i=firstUnhit;i<realN;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();ctx.restore();
  }

  // 未合格point群
  ctx.save();ctx.fillStyle="rgba(55,138,221,0.28)";
  for(let i=firstUnhit+(firstUnhit<realN?1:0);i<realN-1;i++){
    ctx.beginPath();ctx.arc(pts[i].x,pts[i].y,PT_DRAW_R,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // 合格済みライン
  for(let i=0;i<drawScores.length-1;i++){
    ctx.save();ctx.strokeStyle=drawScores[i].color;ctx.lineWidth=3.5;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[i+1].x,pts[i+1].y);
    ctx.stroke();ctx.restore();
  }
  for(let i=0;i<drawScores.length;i++){
    ctx.save();ctx.fillStyle=drawScores[i].color;
    ctx.beginPath();ctx.arc(pts[i].x,pts[i].y,PT_DRAW_R,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // 次のターゲット強調
  if(state==="playing"&&headIdx<realN-1){
    const hp=pts[headIdx];
    ctx.save();
    ctx.beginPath();ctx.arc(hp.x,hp.y,HIT_RADIUS,0,Math.PI*2);
    ctx.fillStyle="rgba(55,138,221,0.10)";ctx.fill();
    ctx.strokeStyle="rgba(55,138,221,0.45)";ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
    ctx.save();ctx.beginPath();ctx.arc(hp.x,hp.y,PT_DRAW_R+2,0,Math.PI*2);
    ctx.fillStyle="#378ADD";ctx.fill();ctx.restore();
  }

  // STARTマーカー
  if(realN>0){
    const sp=pts[0],done=drawScores.length>0;
    ctx.save();ctx.beginPath();ctx.arc(sp.x,sp.y,MARKER_R,0,Math.PI*2);
    ctx.fillStyle=done?"#1D9E75":"#E8A020";ctx.fill();ctx.restore();
    drawMarker(sp.x,sp.y,"START",done?"#1D9E75":"#E8A020");
  }

  // ENDマーカー
  if(realN>0){
    const ep=pts[realN-1],endDone=state==="cleared";
    ctx.save();ctx.beginPath();ctx.arc(ep.x,ep.y,MARKER_R,0,Math.PI*2);
    ctx.fillStyle=endDone?"#1D9E75":"rgba(55,138,221,0.6)";ctx.fill();ctx.restore();
    drawMarker(ep.x,ep.y,"END",endDone?"#1D9E75":"#378ADD");
  }
}

function renderLoop(){
  if(dirty){draw();dirty=false;}
  requestAnimationFrame(renderLoop);
}

function getXY(e){
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}

function processEvent(e){
  const events=e.getCoalescedEvents?e.getCoalescedEvents():[e];
  for(const ce of events){
    if(state==="failing"||state==="idle") break;
    handlePenMove(getXY(ce).x,getXY(ce).y);
  }
}

canvas.addEventListener("pointerdown",e=>{
  e.preventDefault();
  if(state==="failing"){
    resetAttempt();state="playing";drawing=true;
    canvas.setPointerCapture(e.pointerId);
    penX=null;penY=null;prevDist=Infinity;
    processEvent(e);dirty=true;return;
  }
  if(state==="idle"){
    state="playing";drawing=true;
    canvas.setPointerCapture(e.pointerId);
    penX=null;penY=null;prevDist=Infinity;
    processEvent(e);dirty=true;
  }
},{passive:false});

canvas.addEventListener("pointermove",e=>{
  if((state!=="playing"&&state!=="cleared")||!drawing) return;
  e.preventDefault();processEvent(e);
},{passive:false});

canvas.addEventListener("pointerup",()=>{
  if(!drawing) return;
  drawing=false;penX=null;penY=null;prevDist=Infinity;
  if(state==="cleared") onClear();
  else if(state==="playing") onFail("失敗 — ペンを離さず終点まで");
  dirty=true;
});
canvas.addEventListener("pointercancel",()=>{
  if(!drawing) return;
  drawing=false;penX=null;penY=null;prevDist=Infinity;
  if(state==="playing") onFail("失敗 — ペンを離さず終点まで");
  dirty=true;
});

clearBtn.addEventListener("click",()=>{
  if(state==="playing"||state==="idle"||state==="cleared") resetAttempt();
});
nextBtn.addEventListener("click",()=>{newCurve();});

function newCurve(){
  state="idle";headIdx=0;ptScores=[];prevDist=Infinity;
  endBestDist=Infinity;endTempScore=null;
  drawing=false;penX=null;penY=null;
  liveScore.textContent="—";liveLabel.textContent="/ 100";
  scoreBar.style.width="0%";scoreBar.style.background="#E24B4A";
  statusMsg.textContent="START からなぞってください";
  statusMsg.style.color="#888";
  resize();pts=randomCurve();dirty=true;
}

window.addEventListener("resize",()=>newCurve());
newCurve();
renderLoop();
</script>
</body>
</html>
